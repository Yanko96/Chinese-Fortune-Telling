version: '3'

services:
  fortune-api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./fortune_books:/app/fortune_books
      - ./chroma_db:/app/chroma_db
    environment:
      - GOOGLE_API_KEY=AIzaSyDOaLHNK9e2RhjR829X9P7ZSVzd2Nz-zN8
    command: uvicorn fortune_main:app --host 0.0.0.0 --port 8000

  fortune-app:
    build: ./app
    ports:
      - "8501:8501"
    depends_on:
      - fortune-api
    environment:
      - API_URL=http://fortune-api:8000

volumes:
  chroma_db:
