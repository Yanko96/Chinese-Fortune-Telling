name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          # Production runtime deps the tests need to import
          pip install fastapi langchain-core langchain-openai langchain-classic langchain-community
          # Test-only deps
          pip install -r tests/requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
